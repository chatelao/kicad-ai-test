name: KiCad Design Verification

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: setsoft/kicad_auto:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ERC
        run: |
          /usr/bin/kicad-cli sch erc --exit-code-violations 555_blinker.kicad_sch

      - name: Run DRC
        run: |
          /usr/bin/kicad-cli pcb drc --exit-code-violations 555_blinker.kicad_pcb

      - name: Generate Kibot Reports
        run: |
          kibot -c default.kibot.yaml
        continue-on-error: true
