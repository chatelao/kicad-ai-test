name: KiCad CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  erc_drc:
    runs-on: ubuntu-latest
    container:
      image: setsoft/kicad_auto:latest
    steps:
      - uses: actions/checkout@v2
      - name: Run ERC and DRC
        run: |
          kibot -c config.kibot.yaml
