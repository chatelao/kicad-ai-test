name: Hardware Verification

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    container: setsoft/kicad_auto:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run DRC
        run: |
          # Use Xvfb directly as before.
          Xvfb :99 -ac -screen 0 1280x1024x24 > /dev/null 2>&1 &
          export DISPLAY=:99
          sleep 2
          # Try running 'kicad-cli' without absolute path if it was not found at /usr/bin/
          # Also, GEMINI.md mentions Kibot, let's see if it's available.
          if command -v kibot > /dev/null; then
            kibot -c drc
          elif command -v kicad-cli > /dev/null; then
            kicad-cli pcb drc board.kicad_pcb
          else
            echo "Neither kibot nor kicad-cli found"
            find /usr -name "*kicad*"
            exit 1
          fi
