name: Hardware Verification

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    container: setsoft/kicad_auto:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run DRC
        run: |
          # xvfb-run fails due to missing xauth, and apt-get update is broken in this container.
          # We'll use Xvfb directly with access control disabled (-ac).
          Xvfb :99 -ac -screen 0 1280x1024x24 > /dev/null 2>&1 &
          export DISPLAY=:99
          # Give Xvfb a moment to start
          sleep 2
          /usr/bin/kicad-cli pcb drc board.kicad_pcb
