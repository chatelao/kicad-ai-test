name: KiCad CI/CD

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  validate_design:
    runs-on: ubuntu-latest
    container:
      image: setsoft/kicad_auto:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Design
        run: |
          PYTHONPATH=/usr/lib/python3/dist-packages python3 generate_555_design.py

      - name: Run ERC and DRC
        run: |
          mkdir -p reports
          xvfb-run /usr/bin/kicad-cli sch erc project/555_blinker.kicad_sch --output reports/erc_report.txt
          xvfb-run /usr/bin/kicad-cli pcb drc project/555_blinker.kicad_pcb --output reports/drc_report.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
