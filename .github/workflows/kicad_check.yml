name: KiCad ERC and DRC Check

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: setsoft/kicad_auto:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ERC
        run: |
          /usr/bin/kicad-cli sch erc 555_timer.kicad_sch --exit-code-violations
      - name: Run DRC
        run: |
          /usr/bin/kicad-cli pcb drc 555_timer.kicad_pcb --exit-code-violations
